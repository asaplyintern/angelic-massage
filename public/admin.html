<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin | Angelic Massage</title>
    <link rel="stylesheet" href="/styles.css?v=wing-logo-services">
  </head>
  <body>
    <header class="site-header">
      <button class="nav-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-left" aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/services">Services</a>
        <a href="/about">About Us</a>
      </nav>
      <div class="brand" aria-label="Angelic Massage">
        <svg class="brand-wing brand-wing-left" viewBox="0 0 180 62" aria-hidden="true">
          <path class="wing-outline" d="M169 34C134 11 89 5 12 24C44 23 88 27 127 40C91 39 55 44 27 57C74 56 121 50 169 34Z"></path>
          <path d="M157 32C128 24 101 22 65 25"></path>
          <path d="M139 38C111 35 82 38 49 48"></path>
          <path d="M119 42C94 43 71 48 43 58"></path>
          <path d="M96 31C80 34 63 39 45 49"></path>
        </svg>
        <span class="brand-script">Angelic Massage</span>
        <svg class="brand-wing brand-wing-right" viewBox="0 0 180 62" aria-hidden="true">
          <path class="wing-outline" d="M169 34C134 11 89 5 12 24C44 23 88 27 127 40C91 39 55 44 27 57C74 56 121 50 169 34Z"></path>
          <path d="M157 32C128 24 101 22 65 25"></path>
          <path d="M139 38C111 35 82 38 49 48"></path>
          <path d="M119 42C94 43 71 48 43 58"></path>
          <path d="M96 31C80 34 63 39 45 49"></path>
        </svg>
      </div>
    </header>

    <main class="admin-shell">
      <h1>Admin Dashboard</h1>

      <section class="admin-panel" id="login-panel">
        <h2>Admin login</h2>
        <form class="form-grid" id="login-form">
          <div class="notice" id="login-notice"></div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </div>
          <button class="button" type="submit">Log In</button>
        </form>
      </section>

      <section id="dashboard" style="display: none;">
        <div class="admin-panel">
          <div class="admin-toolbar">
            <h2 style="margin: 0;">Appointments</h2>
            <button class="text-button" id="logout" type="button">Log Out</button>
          </div>
          <div class="filter-row">
            <button data-filter data-day="today" data-status="all">Today</button>
            <button data-filter data-day="upcoming" data-status="all">Upcoming</button>
            <button data-filter data-day="upcoming" data-status="pending">Pending</button>
            <button data-filter data-day="upcoming" data-status="confirmed">Confirmed</button>
            <button data-filter data-day="" data-status="cancelled">Cancelled</button>
            <button data-filter data-day="" data-status="complete">Complete</button>
          </div>
          <div class="appointment-list" id="appointment-list"></div>
        </div>

        <div class="admin-panel">
          <h2>Customer history</h2>
          <form class="filter-row" id="customer-search">
            <input name="q" placeholder="Search name, phone, or email" required>
            <button type="submit">Search</button>
          </form>
          <div class="appointment-list" id="history-list"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <strong>Angelic Massage</strong>
      <div class="footer-details">
        <span data-address></span>
        <a data-phone></a>
        <a data-email></a>
      </div>
    </footer>
    <script src="/site.js?v=wing-logo-services"></script>
    <script src="/admin.js"></script>
  </body>
</html>
